version: '3.8'

services:
  # ── Main scraper container ──────────────────────────────────────────────────
  scraper:
    build:
      context: .
      target: runtime
    image: food-delivery-scraper:latest
    container_name: food_scraper
    volumes:
      - ./data:/app/data          # Persist scraped data on host
      - ./logs:/app/logs          # Persist logs on host
      - ./config:/app/config:ro   # Read-only config mount
    environment:
      - SCRAPER_LOG_LEVEL=${SCRAPER_LOG_LEVEL:-INFO}
      - SCRAPER_BROWSER_HEADLESS=true
      - SCRAPER_PROXY_ENABLED=${SCRAPER_PROXY_ENABLED:-false}
      - SCRAPER_PROXY_PROXIES=${SCRAPER_PROXY_PROXIES:-}
      - PYTHONUNBUFFERED=1
    # Uncomment to use host network (needed for some proxy setups):
    # network_mode: "host"
    restart: "no"
    command: ["python", "-m", "scraper.cli", "--help"]

  # ── One-shot scrape task (override command at runtime) ─────────────────────
  # docker-compose run --rm scrape-task --platform grabfood --location jakarta --pages 5
  scrape-task:
    build:
      context: .
      target: runtime
    image: food-delivery-scraper:latest
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    environment:
      - SCRAPER_LOG_LEVEL=${SCRAPER_LOG_LEVEL:-INFO}
      - SCRAPER_BROWSER_HEADLESS=true
      - PYTHONUNBUFFERED=1
    entrypoint: ["python", "-m", "scraper.cli", "scrape"]
    restart: "no"

  # ── Optional: PostgreSQL backend ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: food_scraper_db
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper_dev_pass}
      POSTGRES_DB: food_scraper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d food_scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres  # Only starts with: docker-compose --profile postgres up

volumes:
  postgres_data:
    driver: local
